services:
  tooljet:
    image: 'tooljet/tooljet:latest'
    container_name: tooljet-app
    restart: unless-stopped
    ports:
      - '80:3000'
    environment:
      SERVE_CLIENT: 'true'
      TOOLJET_HOST: 'https://tools2.bforward.com.mx'
      SECRET_KEY_BASE: '${SECRET_KEY_BASE}'
      LOCKBOX_MASTER_KEY: '${LOCKBOX_MASTER_KEY}'
      PG_HOST: 'postgres'
      PG_PORT: '5432'
      PG_DB: '${PG_DB}'
      PG_USER: '${PG_USER}'
      PG_PASS: '${PG_PASS}'
      REDIS_URL: 'redis://redis:6379'
      SSO_AZURE_CLIENT_ID: '${SSO_AZURE_CLIENT_ID}'
      SSO_AZURE_CLIENT_SECRET: '${SSO_AZURE_CLIENT_SECRET}'
      SSO_AZURE_TENANT_ID: '${SSO_AZURE_TENANT_ID}'
      SSO_ACCEPT_INVITED_USERS_ONLY: 'false'
    depends_on:
      - postgres
      - redis
    networks:
      - tooljet-network
  postgres:
    image: postgres:13
    container_name: tooljet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-tooljet}
      POSTGRES_USER: ${PG_USER:-tooljet}
      POSTGRES_PASSWORD: ${PG_PASS:?}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tooljet-network

  redis:
    image: redis:7
    container_name: tooljet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - tooljet-network

volumes:
  postgres_data:
  redis_data:

networks:
  tooljet-network:
    driver: bridge
