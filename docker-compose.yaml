services:
  tooljet:
    image: tooljet/tooljet:latest
    container_name: tooljet-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8081:80"  # Cambiado de 80:80 a 8080:80
    environment:
      SERVE_CLIENT: "true"
      PORT: "80"
      SSO_AZURE_CLIENT_ID: '<Application ID de ToolJet SSO>'
      SSO_AZURE_CLIENT_SECRET: 'VOh8Q~c_IO.oWPJeN54Rv__LbkM0FYNBbAr-xaH6'
      SSO_AZURE_TENANT_ID: 'ed4748db-77d2-447b-abcb-e59f1ef81f2a'
      SSO_ACCEPT_INVITED_USERS_ONLY: 'false'
    command: npm run start:prod
    depends_on:
      - postgres
      - redis
    networks:
      - tooljet-network
  postgres:
    image: postgres:13
    container_name: tooljet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-tooljet}
      POSTGRES_USER: ${PG_USER:-tooljet}
      POSTGRES_PASSWORD: ${PG_PASS:?}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tooljet-network

  redis:
    image: redis:7
    container_name: tooljet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    networks:
      - tooljet-network

volumes:
  postgres_data:
  redis_data:

networks:
  tooljet-network:
    driver: bridge
